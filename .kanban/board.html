<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Finance — Kanban Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tiempos+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Anthropic Academy palette */
      --bg: #F5F0E8;
      --surface: #EDE7DC;
      --surface-hover: #E4DDD0;
      --surface-card: #C8BFA8;
      --surface-teal: #8FB5A6;
      --border: #D4CCBA;
      --border-strong: #BDB49E;
      --text: #1A1714;
      --text-muted: #7A6E62;
      --text-on-teal: #0E2B24;
      --accent: #1A1714;
      --accent-hover: #3D3530;
      /* Semantic colours — muted to match warm palette */
      --green: #3D7A52;
      --orange: #A0602A;
      --purple: #6B4E8A;
      --blue: #3B5F9A;
      --gray: #7A6E62;
      --yellow: #9A7A1A;
      --red: #9A3B3B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    header h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .meta {
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .meta strong { color: var(--text); font-weight: 600; }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      padding: 24px 20px;
      min-height: calc(100vh - 160px);
      overflow-x: auto;
    }

    @media (max-width: 1200px) {
      .board { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 768px) {
      .board { grid-template-columns: 1fr; }
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      min-width: 260px;
    }

    .column-header {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.01em;
    }

    .column-header .count {
      background: var(--border);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .column-body {
      padding: 8px;
      flex: 1;
      overflow-y: auto;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: grab;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: var(--border-strong);
      background: var(--surface-card);
      box-shadow: 0 2px 8px rgba(26, 23, 20, 0.08);
    }

    .card:last-child { margin-bottom: 0; }

    .card-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: 0.03em;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 9px;
      color: var(--text);
    }

    .card-meta {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .label {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .label-feature  { background: #3B5F9A22; color: var(--blue);   border: 1px solid #3B5F9A33; }
    .label-learning { background: #3D7A5222; color: var(--green);  border: 1px solid #3D7A5233; }
    .label-infra    { background: #A0602A22; color: var(--orange); border: 1px solid #A0602A33; }
    .label-ai       { background: #6B4E8A22; color: var(--purple); border: 1px solid #6B4E8A33; }
    .label-docs     { background: #7A6E6222; color: var(--gray);   border: 1px solid #7A6E6233; }
    .label-test     { background: #9A7A1A22; color: var(--yellow); border: 1px solid #9A7A1A33; }

    .sprint-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 28px 16px;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
    }

    /* Column top-border accents */
    .col-backlog { border-top: 3px solid var(--gray); }
    .col-ready   { border-top: 3px solid var(--blue); }
    .col-progress{ border-top: 3px solid var(--orange); }
    .col-review  { border-top: 3px solid var(--purple); }
    .col-done    { border-top: 3px solid var(--green); }

    .card-completed { opacity: 0.55; }
    .card-completed .card-title {
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
    }

    /* ── Drag and drop ── */
    .card.dragging {
      opacity: 0.3;
      transform: rotate(1.5deg) scale(0.97);
      cursor: grabbing;
    }

    .column-body.drag-over {
      background: rgba(143, 181, 166, 0.25);
      outline: 2px dashed var(--surface-teal);
      outline-offset: -3px;
      border-radius: 6px;
    }

    footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
    }

    footer code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
    }

    .filter-bar {
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .filter-btn:hover {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--surface);
    }

    .filter-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 23, 20, 0.45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
      overflow-y: auto;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      width: 100%;
      max-width: 680px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      box-shadow: 0 24px 48px rgba(26, 23, 20, 0.18);
      animation: modalIn 0.15s ease-out;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      padding: 22px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .modal-header-left {
      flex: 1;
      min-width: 0;
    }

    .modal-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 5px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .modal-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 10px;
      color: var(--text);
    }

    .modal-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
      font-family: inherit;
    }

    .modal-close:hover {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--surface-hover);
    }

    .modal-body { padding: 20px 24px 24px; }

    .modal-section { margin-bottom: 20px; }
    .modal-section:last-child { margin-bottom: 0; }

    .modal-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .modal-section p { font-size: 14px; line-height: 1.6; color: var(--text); }

    .modal-status-bar {
      display: flex;
      gap: 16px;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .modal-status-item { display: flex; align-items: center; gap: 6px; }
    .modal-status-label { color: var(--text-muted); }
    .modal-status-value { font-weight: 500; }

    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .status-done     { background: #3D7A5218; color: var(--green);  border-color: #3D7A5230; }
    .status-ready    { background: #3B5F9A18; color: var(--blue);   border-color: #3B5F9A30; }
    .status-backlog  { background: var(--surface-hover); color: var(--text-muted); border-color: var(--border); }
    .status-progress { background: #A0602A18; color: var(--orange); border-color: #A0602A30; }
    .status-review   { background: #6B4E8A18; color: var(--purple); border-color: #6B4E8A30; }

    /* Checklist */
    .checklist { list-style: none; padding: 0; }
    .checklist li {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 0; font-size: 13px; line-height: 1.5;
      border-bottom: 1px solid var(--border);
    }
    .checklist li:last-child { border-bottom: none; }

    .check-icon {
      flex-shrink: 0; width: 18px; height: 18px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; margin-top: 2px;
    }
    .check-done {
      background: #3D7A5220; color: var(--green); border: 1px solid #3D7A5244;
    }
    .check-pending {
      background: transparent; border: 1px solid var(--border); color: transparent;
    }
    .checklist li.done {
      color: var(--text-muted);
      text-decoration: line-through;
      text-decoration-color: var(--border-strong);
    }

    /* Code block in modal */
    .modal-code {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 12px 16px; font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px; line-height: 1.6; overflow-x: auto;
      white-space: pre-wrap; word-break: break-word; color: var(--text);
    }

    .modal-deps { display: flex; gap: 6px; flex-wrap: wrap; }

    .dep-tag {
      font-size: 12px; padding: 2px 10px; border-radius: 4px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-muted); font-family: 'SF Mono', 'Fira Code', monospace;
      cursor: pointer; transition: all 0.15s;
    }
    .dep-tag:hover {
      border-color: var(--border-strong); color: var(--text);
      background: var(--surface-hover);
    }

    /* ── Markdown rendered content ── */
    .md-body { font-size: 14px; line-height: 1.65; color: var(--text); }
    .md-body h1 { font-family: Georgia, serif; font-size: 18px; font-weight: 600; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .md-body h2 { font-family: Georgia, serif; font-size: 15px; font-weight: 600; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .md-body h3 { font-size: 12px; font-weight: 600; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .md-body h4, .md-body h5, .md-body h6 { font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    .md-body p { margin: 0 0 10px; }
    .md-body ul, .md-body ol { margin: 0 0 10px; padding-left: 20px; }
    .md-body li { margin-bottom: 4px; }
    .md-body li p { margin: 0; }
    .md-body code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; background: var(--surface-hover); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; }
    .md-body pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; overflow-x: auto; margin: 0 0 12px; }
    .md-body pre code { background: none; border: none; padding: 0; font-size: 12px; line-height: 1.6; }
    .md-body blockquote { border-left: 3px solid var(--border-strong); margin: 0 0 10px; padding: 4px 12px; color: var(--text-muted); font-style: italic; }
    .md-body table { width: 100%; border-collapse: collapse; margin: 0 0 12px; font-size: 13px; }
    .md-body th, .md-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .md-body th { background: var(--surface-hover); font-weight: 600; color: var(--text-muted); }
    .md-body tr:nth-child(even) td { background: rgba(26, 23, 20, 0.025); }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .md-body a { color: var(--blue); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body strong { font-weight: 600; }
    .md-body em { font-style: italic; color: var(--text-muted); }
    /* task checkboxes */
    .md-body input[type="checkbox"] { accent-color: var(--green); margin-right: 6px; }
    .md-body li:has(input[type="checkbox"]) { list-style: none; margin-left: -16px; }
    .md-loading { color: var(--text-muted); font-style: italic; font-size: 13px; padding: 20px 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>

<header>
  <h1>Personal Finance <span>— Kanban Board</span></h1>
  <div class="meta">
    <div>Sprint: <strong>Cleanup &rarr; Ramp-Up</strong></div>
    <div>Updated: <strong>2026-03-01</strong></div>
    <div>WIP Limit: <strong>2</strong></div>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterSprint('all')">All</button>
  <button class="filter-btn" onclick="filterSprint('setup')">Setup</button>
  <button class="filter-btn" onclick="filterSprint('cleanup')">Cleanup</button>
  <button class="filter-btn" onclick="filterSprint('ramp-up')">Ramp-Up</button>
  <button class="filter-btn" onclick="filterSprint('S1')">Sprint 1</button>
  <button class="filter-btn" onclick="filterSprint('S2')">Sprint 2</button>
  <button class="filter-btn" onclick="filterSprint('S3')">Sprint 3</button>
  <button class="filter-btn" onclick="filterSprint('S4')">Sprint 4</button>
</div>

<div class="board" id="board"></div>

<!-- Task Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<footer>
  Generated from <code>.kanban/BOARD.md</code> &mdash; Personal Finance AI Platform
</footer>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────────
let tasks = [];

const columns = [
  { key: "backlog",  name: "Backlog",     cssClass: "col-backlog" },
  { key: "ready",    name: "Ready",       cssClass: "col-ready" },
  { key: "progress", name: "In Progress", cssClass: "col-progress" },
  { key: "review",   name: "Review",      cssClass: "col-review" },
  { key: "done",     name: "Done",        cssClass: "col-done" },
];

const statusNames = { backlog: "Backlog", ready: "Ready", progress: "In Progress", review: "Review", done: "Done" };

let currentFilter = "all";

function filterSprint(sprint) {
  currentFilter = sprint;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderBoard();
}

function getFilteredTasks() {
  if (currentFilter === "all") return tasks;
  return tasks.filter(t => t.sprint === currentFilter);
}

// ── DRAG AND DROP ────────────────────────────────────────────────────────────────

function onDragStart(e, taskId) {
  e.dataTransfer.setData("text/plain", taskId);
  e.dataTransfer.effectAllowed = "move";
  setTimeout(() => e.target.classList.add("dragging"), 0);
}

function onDragEnd(e) {
  e.target.classList.remove("dragging");
  document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  e.currentTarget.classList.add("drag-over");
}

function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove("drag-over");
  }
}

async function onDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  const taskId = e.dataTransfer.getData("text/plain");
  const task = tasks.find(t => t.id === taskId);
  if (!task || task.status === newStatus) return;

  const prevStatus = task.status;
  const prevCompleted = task.completed;
  task.status = newStatus;

  if (newStatus === "done" && !task.completed) {
    const now = new Date();
    task.completed = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
  } else if (newStatus !== "done") {
    delete task.completed;
  }

  renderBoard();

  try {
    const res = await fetch(`/api/tasks/${encodeURIComponent(taskId)}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: newStatus, completed: task.completed ?? null }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch (err) {
    console.error("Failed to save status change:", err);
    task.status = prevStatus;
    task.completed = prevCompleted;
    if (prevCompleted === undefined) delete task.completed;
    renderBoard();
  }
}

// ── RENDER ENGINE ────────────────────────────────────────────────────────────────

function renderCard(task) {
  const isDone = task.status === "done";
  const labels = task.labels.map(l =>
    `<span class="label label-${l}">${l}</span>`
  ).join("");

  return `
    <div class="card ${isDone ? 'card-completed' : ''}"
         data-sprint="${task.sprint}"
         data-id="${task.id}"
         draggable="true"
         ondragstart="onDragStart(event, '${task.id}')"
         ondragend="onDragEnd(event)"
         onclick="openModal('${task.id}')">
      <div class="card-id">${task.id}</div>
      <div class="card-title">${task.title}</div>
      <div class="card-meta">
        <span class="sprint-tag">${task.sprint}</span>
        ${labels}
        ${task.completed ? `<span class="sprint-tag">${task.completed}</span>` : ''}
      </div>
    </div>
  `;
}

function renderBoard() {
  const filtered = getFilteredTasks();
  const board = document.getElementById("board");

  board.innerHTML = columns.map(col => {
    const colTasks = filtered.filter(t => t.status === col.key);
    const cardsHtml = colTasks.length > 0
      ? colTasks.map(renderCard).join("")
      : `<div class="empty-state">No tasks</div>`;

    return `
      <div class="column ${col.cssClass}">
        <div class="column-header">
          ${col.name}
          <span class="count">${colTasks.length}</span>
        </div>
        <div class="column-body"
             ondragover="onDragOver(event)"
             ondragleave="onDragLeave(event)"
             ondrop="onDrop(event, '${col.key}')">
          ${cardsHtml}
        </div>
      </div>
    `;
  }).join("");

}

// ── MODAL ────────────────────────────────────────────────────────────────────────

async function openModal(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  const overlay = document.getElementById("modal-overlay");
  const modal = document.getElementById("modal");

  const labels = task.labels.map(l => `<span class="label label-${l}">${l}</span>`).join("");
  const statusClass = "status-" + task.status;
  const statusText = statusNames[task.status] || task.status;

  // Render shell immediately with loading state
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-id">${task.id}</div>
        <div class="modal-title">${task.title}</div>
        <div class="modal-tags">
          <span class="sprint-tag">${task.sprint}</span>
          ${labels}
          ${task.completed ? `<span class="sprint-tag">\u2713 ${task.completed}</span>` : ''}
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()" title="Close (Esc)">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-status-bar">
        <div class="modal-status-item">
          <span class="modal-status-label">Status</span>
          <span class="status-badge ${statusClass}">${statusText}</span>
        </div>
        <div class="modal-status-item">
          <span class="modal-status-label">Sprint</span>
          <span class="modal-status-value">${task.sprint}</span>
        </div>
      </div>
      <div id="modal-md-content" class="md-loading">Loading\u2026</div>
    </div>
  `;

  overlay.classList.add("open");
  document.body.style.overflow = "hidden";

  // Fetch and render the markdown file
  try {
    const res = await fetch(`/api/tasks/${encodeURIComponent(taskId)}/markdown`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const mdText = await res.text();
    const html = marked.parse(mdText, { gfm: true, breaks: false });
    const el = document.getElementById("modal-md-content");
    if (el) {
      el.className = "md-body";
      el.innerHTML = html;
    }
  } catch (err) {
    const el = document.getElementById("modal-md-content");
    if (el) {
      el.className = "";
      el.innerHTML = `<p style="color:var(--red);font-size:13px;font-style:italic">Could not load task detail: ${err.message}</p>`;
    }
  }
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

// ── INIT ────────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch("/api/tasks");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    tasks = await res.json();
  } catch {
    document.getElementById("board").innerHTML = `
      <div style="padding:48px;text-align:center;color:var(--text-muted);grid-column:1/-1">
        <p style="font-size:15px;margin-bottom:8px;color:var(--text)">Could not load tasks &mdash; is the server running?</p>
        <p style="font-family:monospace;font-size:13px;color:var(--orange)">npm run kanban</p>
        <p style="font-size:12px;margin-top:4px">then open <a href="http://localhost:3001" style="color:var(--blue)">localhost:3001</a></p>
      </div>`;
    return;
  }
  renderBoard();
}

init();
</script>
</body>
</html>
