<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Finance — Kanban Board</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --purple: #bc8cff;
      --blue: #58a6ff;
      --gray: #8b949e;
      --yellow: #e3b341;
      --red: #f85149;
      --col-backlog: #30363d;
      --col-ready: #1f6feb33;
      --col-progress: #d2992233;
      --col-review: #bc8cff33;
      --col-done: #3fb95033;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    header h1 span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .meta {
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .meta strong { color: var(--text); }

    .progress-bar-container {
      padding: 12px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .progress-row:last-child { margin-bottom: 0; }

    .progress-label {
      width: 80px;
      text-align: right;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .progress-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-pct {
      width: 48px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-muted);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      padding: 20px 16px;
      min-height: calc(100vh - 160px);
      overflow-x: auto;
    }

    @media (max-width: 1200px) {
      .board {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .board {
        grid-template-columns: 1fr;
      }
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      min-width: 260px;
    }

    .column-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 14px;
    }

    .column-header .count {
      background: var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .column-body {
      padding: 8px;
      flex: 1;
      overflow-y: auto;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
    }

    .card:last-child { margin-bottom: 0; }

    .card-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .label {
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .label-feature { background: #1f6feb33; color: var(--blue); }
    .label-learning { background: #3fb95033; color: var(--green); }
    .label-infra { background: #d2992233; color: var(--orange); }
    .label-ai { background: #bc8cff33; color: var(--purple); }
    .label-docs { background: #8b949e33; color: var(--gray); }
    .label-test { background: #e3b34133; color: var(--yellow); }

    .sprint-tag {
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 10px;
      background: var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
    }

    /* Column top-border accents */
    .col-backlog { border-top: 3px solid var(--gray); }
    .col-ready { border-top: 3px solid var(--blue); }
    .col-progress { border-top: 3px solid var(--orange); }
    .col-review { border-top: 3px solid var(--purple); }
    .col-done { border-top: 3px solid var(--green); }

    .card-completed {
      opacity: 0.6;
    }

    .card-completed .card-title {
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
    }

    footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .filter-bar {
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: #1f6feb22;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
      overflow-y: auto;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 680px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
      animation: modalIn 0.15s ease-out;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .modal-header-left {
      flex: 1;
      min-width: 0;
    }

    .modal-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .modal-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface-hover);
    }

    .modal-body {
      padding: 20px 24px 24px;
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section:last-child {
      margin-bottom: 0;
    }

    .modal-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .modal-section p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }

    .modal-status-bar {
      display: flex;
      gap: 16px;
      padding: 12px 16px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .modal-status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-status-label {
      color: var(--text-muted);
    }

    .modal-status-value {
      font-weight: 500;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-done { background: #3fb95033; color: var(--green); }
    .status-ready { background: #1f6feb33; color: var(--blue); }
    .status-backlog { background: var(--border); color: var(--text-muted); }
    .status-progress { background: #d2992233; color: var(--orange); }
    .status-review { background: #bc8cff33; color: var(--purple); }

    /* Checklist */
    .checklist {
      list-style: none;
      padding: 0;
    }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 0;
      font-size: 13px;
      line-height: 1.5;
      border-bottom: 1px solid #30363d44;
    }

    .checklist li:last-child {
      border-bottom: none;
    }

    .check-icon {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      margin-top: 2px;
    }

    .check-done {
      background: #3fb95033;
      color: var(--green);
      border: 1px solid #3fb95055;
    }

    .check-pending {
      background: transparent;
      border: 1px solid var(--border);
      color: transparent;
    }

    .checklist li.done {
      color: var(--text-muted);
      text-decoration: line-through;
      text-decoration-color: #8b949e66;
    }

    /* Code block in modal */
    .modal-code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .modal-deps {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .dep-tag {
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'SF Mono', 'Fira Code', monospace;
      cursor: pointer;
      transition: all 0.15s;
    }

    .dep-tag:hover {
      border-color: var(--accent);
      background: #1f6feb22;
    }
  </style>
</head>

// ── RENDER ENGINE ───────────────────────────────────────────────────────────────

const columns = [
  { key: "backlog",  name: "Backlog",     cssClass: "col-backlog" },
  { key: "ready",    name: "Ready",       cssClass: "col-ready" },
  { key: "progress", name: "In Progress", cssClass: "col-progress" },
  { key: "review",   name: "Review",      cssClass: "col-review" },
  { key: "done",     name: "Done",        cssClass: "col-done" },
];

const statusNames = { backlog: "Backlog", ready: "Ready", progress: "In Progress", review: "Review", done: "Done" };

let currentFilter = "all";

function filterSprint(sprint) {
  currentFilter = sprint;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderBoard();
}

function getFilteredTasks() {
  if (currentFilter === "all") return tasks;
  return tasks.filter(t => t.sprint === currentFilter);
}

function renderCard(task) {
  const isDone = task.status === "done";
  const labels = task.labels.map(l =>
    `<span class="label label-${l}">${l}</span>`
  ).join("");

  return `
    <div class="card ${isDone ? 'card-completed' : ''}" data-sprint="${task.sprint}" onclick="openModal('${task.id}')">
      <div class="card-id">${task.id}</div>
      <div class="card-title">${task.title}</div>
      <div class="card-meta">
        <span class="sprint-tag">${task.sprint}</span>
        ${labels}
        ${task.completed ? `<span class="sprint-tag">${task.completed}</span>` : ''}
      </div>
    </div>
  `;
}

function renderBoard() {
  const filtered = getFilteredTasks();
  const board = document.getElementById("board");

  board.innerHTML = columns.map(col => {
    const colTasks = filtered.filter(t => t.status === col.key);
    const cardsHtml = colTasks.length > 0
      ? colTasks.map(renderCard).join("")
      : `<div class="empty-state">No tasks</div>`;

    return `
      <div class="column ${col.cssClass}">
        <div class="column-header">
          ${col.name}
          <span class="count">${colTasks.length}</span>
        </div>
        <div class="column-body">${cardsHtml}</div>
      </div>
    `;
  }).join("");

  renderProgress();
}

function renderProgress() {
  const sprintConfigs = [
    { key: "setup", name: "Setup", color: "#8b949e" },
    { key: "cleanup", name: "Cleanup", color: "#f0883e" },
    { key: "ramp-up", name: "Ramp-Up", color: "#3fb950" },
    { key: "S1", name: "Sprint 1", color: "#58a6ff" },
    { key: "S2", name: "Sprint 2", color: "#bc8cff" },
    { key: "S3", name: "Sprint 3", color: "#d29922" },
    { key: "S4", name: "Sprint 4", color: "#f85149" },
  ];

  const totalDone = tasks.filter(t => t.status === "done").length;
  const totalAll = tasks.length;
  const overallPct = Math.round((totalDone / totalAll) * 100);

  let html = sprintConfigs.map(s => {
    const total = tasks.filter(t => t.sprint === s.key).length;
    const done = tasks.filter(t => t.sprint === s.key && t.status === "done").length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    return `
      <div class="progress-row">
        <span class="progress-label">${s.name}</span>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%;background:${s.color}"></div>
        </div>
        <span class="progress-pct">${done}/${total}</span>
      </div>
    `;
  }).join("");

  html += `
    <div class="progress-row" style="margin-top:4px;border-top:1px solid var(--border);padding-top:8px">
      <span class="progress-label" style="font-weight:600;color:var(--text)">Overall</span>
      <div class="progress-track">
        <div class="progress-fill" style="width:${overallPct}%;background:var(--accent)"></div>
      </div>
      <span class="progress-pct" style="color:var(--text);font-weight:600">${overallPct}%</span>
    </div>
  `;

  document.getElementById("progress-section").innerHTML = html;
}

// ── MODAL ────────────────────────────────────────────────────────────────────────

function openModal(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  const overlay = document.getElementById("modal-overlay");
  const modal = document.getElementById("modal");

  const labels = task.labels.map(l => `<span class="label label-${l}">${l}</span>`).join("");
  const statusClass = "status-" + task.status;
  const statusText = statusNames[task.status] || task.status;

  const doneCount = (task.criteria || []).filter(c => c.done).length;
  const totalCount = (task.criteria || []).length;
  const progressPct = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;

  const criteriaHtml = (task.criteria || []).map(c => `
    <li class="${c.done ? 'done' : ''}">
      <span class="check-icon ${c.done ? 'check-done' : 'check-pending'}">${c.done ? '\u2713' : ''}</span>
      <span>${c.text}</span>
    </li>
  `).join("");

  const depsHtml = (task.deps || []).length > 0
    ? task.deps.map(d => `<span class="dep-tag" onclick="event.stopPropagation();openModal('${d}')">${d}</span>`).join("")
    : '<span style="color:var(--text-muted);font-size:13px">None</span>';

  const notesHtml = task.notes
    ? `<div class="modal-code">${task.notes}</div>`
    : '<p style="color:var(--text-muted);font-style:italic">No technical notes.</p>';

  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-id">${task.id}</div>
        <div class="modal-title">${task.title}</div>
        <div class="modal-tags">
          <span class="sprint-tag">${task.sprint}</span>
          ${labels}
          ${task.completed ? `<span class="sprint-tag">\u2713 ${task.completed}</span>` : ''}
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()" title="Close (Esc)">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-status-bar">
        <div class="modal-status-item">
          <span class="modal-status-label">Status</span>
          <span class="status-badge ${statusClass}">${statusText}</span>
        </div>
        <div class="modal-status-item">
          <span class="modal-status-label">Progress</span>
          <span class="modal-status-value">${doneCount}/${totalCount} (${progressPct}%)</span>
        </div>
        <div class="modal-status-item">
          <span class="modal-status-label">Sprint</span>
          <span class="modal-status-value">${task.sprint}</span>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Objective</div>
        <p>${task.objective || '<em style="color:var(--text-muted)">No objective defined.</em>'}</p>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Acceptance Criteria</div>
        ${totalCount > 0 ? `<ul class="checklist">${criteriaHtml}</ul>` : '<p style="color:var(--text-muted);font-style:italic">No criteria defined.</p>'}
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Technical Notes</div>
        ${notesHtml}
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Dependencies</div>
        <div class="modal-deps">${depsHtml}</div>
      </div>
    </div>
  `;

  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

// ── INIT ────────────────────────────────────────────────────────────────────────
renderBoard();
</script>
