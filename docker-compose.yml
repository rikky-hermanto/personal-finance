services:
  db:
    image: postgres:16-alpine
    container_name: personalfinance-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: personal_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personal_finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: personalfinance-api
    ports:
      - "7208:7208"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:7208
      - ConnectionStrings__Default=Host=db;Port=5432;Database=personal_finance;Username=postgres;Password=postgres123
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:7208
    container_name: personalfinance-frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
